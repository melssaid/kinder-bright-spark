name: Deploy to Lovable

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deployment notice
        run: |
          echo "✅ Build succeeded."
          echo "🚀 Lovable.app automatically deploys from the main branch."
          echo "🌐 Your app will be live at https://kinder-bh.lovable.app/"
